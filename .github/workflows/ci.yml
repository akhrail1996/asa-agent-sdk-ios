name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict

      - name: Build & run tests
        run: |
          SIM_NAME=$(xcrun simctl list devices available | grep 'iPhone' | head -1 | sed 's/^ *//;s/ (.*//')
          echo "Using simulator: $SIM_NAME"
          xcodebuild test \
            -scheme ASAAgentSDK \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,OS=latest,name=$SIM_NAME" \
            -quiet
